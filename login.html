<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" id="theme-color-meta" content="#212121" />
  <title>Login - Campus AI</title>
  <link rel="icon" href="clg_logo.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
  <header class="auth-topbar">
    <div class="auth-topbar-inner">
      <div class="auth-brand">
        <img src="clg_logo.png" alt="" onerror="this.style.display='none'" />
        <span>Campus AI</span>
      </div>
      <div class="dd-row">
        <div class="dd-row-left">
          <span>Light mode</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="theme-chk" />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
    </div>
  </header>

  <main class="auth-container">
    <section class="auth-box">
      <h2>Welcome back</h2>
      <p class="auth-sub">Sign in to continue chatting with Campus AI.</p>

      <form onsubmit="event.preventDefault(); login();">
        <input
          type="text"
          id="register_number"
          placeholder="Register Number"
          autocomplete="username"
          required
        />
        <input
          type="password"
          id="password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
        <button type="submit">Continue</button>
      </form>

      <p>Don't have an account? <a href="register.html">Create one</a></p>
    </section>
  </main>

  <script>
    const themeKey = "campus_ai_theme_v5";
    const themeChk = document.getElementById("theme-chk");
    const themeMeta = document.getElementById("theme-color-meta");
    const currentTheme = localStorage.getItem(themeKey) || "dark";

    document.documentElement.setAttribute("data-theme", currentTheme);
    themeChk.checked = currentTheme === "light";
    themeMeta.content = currentTheme === "light" ? "#ffffff" : "#212121";

    themeChk.addEventListener("change", () => {
      const newTheme = themeChk.checked ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", newTheme);
      localStorage.setItem(themeKey, newTheme);
      themeMeta.content = newTheme === "light" ? "#ffffff" : "#212121";
    });
  </script>
  <script src="auth.js"></script>
</body>
</html>
