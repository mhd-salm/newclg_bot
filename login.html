<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" id="theme-color-meta" content="#111111" />
  <title>Campus AI — Login</title>
  <link rel="icon" href="clg_logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    :root {
      --bg: #111111; --surface: #1a1a1a; --surf2: #222222;
      --bd: rgba(255,255,255,0.08); --bd2: rgba(255,255,255,0.14);
      --tx: #f0f0f0; --tx2: #888; --tx3: #555;
      --ac: #10a37f; --ac-h: #0d8f6e; --ac-glow: rgba(16,163,127,0.22);
      --red: #ef4444; --r: 12px;
    }
    [data-theme="light"] {
      --bg: #f4f4f5; --surface: #ffffff; --surf2: #f0f0f1;
      --bd: rgba(0,0,0,0.08); --bd2: rgba(0,0,0,0.14);
      --tx: #111; --tx2: #666; --tx3: #aaa;
    }
    body { font-family: 'Sora', system-ui, sans-serif; background: var(--bg); color: var(--tx); display: flex; flex-direction: column; min-height: 100dvh; -webkit-font-smoothing: antialiased; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    a { color: var(--ac); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .topbar { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--bd); }
    .brand { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
    .brand img { width: 28px; height: 28px; border-radius: 8px; object-fit: cover; }
    .theme-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--tx2); }

    .tog { cursor: pointer; }
    .tog input { display: none; }
    .tog-track { width: 38px; height: 20px; border-radius: 999px; background: var(--surf2); border: 1px solid var(--bd2); position: relative; display: block; transition: background 0.18s; }
    .tog-thumb { width: 14px; height: 14px; border-radius: 999px; background: var(--tx3); position: absolute; top: 2px; left: 2px; transition: transform 0.18s, background 0.18s; }
    .tog input:checked + .tog-track { background: var(--ac); border-color: var(--ac); }
    .tog input:checked + .tog-track .tog-thumb { transform: translateX(18px); background: #fff; }

    .page { flex: 1; display: grid; place-items: center; padding: 28px 16px; }

    .card { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--bd); border-radius: 20px; padding: 28px 28px 24px; box-shadow: 0 24px 60px rgba(0,0,0,0.35); animation: rise 0.28s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .role-bar { display: flex; gap: 4px; background: var(--surf2); border-radius: 10px; padding: 4px; margin-bottom: 26px; }
    .role-pill { flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px; padding: 9px 0; border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--tx2); transition: background 0.18s, color 0.18s, box-shadow 0.18s; }
    .role-pill:hover { color: var(--tx); }
    .role-pill.active { background: var(--ac); color: #fff; box-shadow: 0 4px 14px var(--ac-glow); }

    .card-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: var(--tx2); margin-bottom: 22px; }
    .admin-chip { display: inline-flex; align-items: center; gap: 5px; background: rgba(239,68,68,0.1); color: #ef4444; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-bottom: 14px; }

    .form { display: flex; flex-direction: column; gap: 12px; }
    .field { position: relative; }
    .field-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--tx3); display: flex; align-items: center; pointer-events: none; }
    .field input { width: 100%; background: var(--surf2); border: 1px solid var(--bd); color: var(--tx); border-radius: var(--r); height: 46px; padding: 0 14px 0 40px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.18s, box-shadow 0.18s; }
    .field input:focus { border-color: var(--ac); box-shadow: 0 0 0 3px var(--ac-glow); }
    .field input::placeholder { color: var(--tx3); }

    .submit-btn { width: 100%; height: 46px; background: var(--ac); color: #fff; border-radius: var(--r); font-size: 14px; font-weight: 600; letter-spacing: 0.02em; transition: background 0.18s, transform 0.12s, box-shadow 0.18s; margin-top: 2px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .submit-btn:hover { background: var(--ac-h); box-shadow: 0 6px 20px var(--ac-glow); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.6; pointer-events: none; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { font-size: 12px; color: var(--red); background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 8px 12px; display: none; }
    .error-msg.visible { display: block; }

    .divider { height: 1px; background: var(--bd); margin: 20px 0; }
    .card-footer { text-align: center; font-size: 13px; color: var(--tx2); }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    @media (max-width: 480px) {
      .card { padding: 22px 18px 20px; border-radius: 16px; }
      .card-title { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="clg_logo.png" alt="" onerror="this.style.display='none'" />
      Campus AI
    </div>
    <div class="theme-row">
      <span>Light</span>
      <label class="tog">
        <input type="checkbox" id="theme-chk" />
        <span class="tog-track"><span class="tog-thumb"></span></span>
      </label>
    </div>
  </header>

  <div class="page">
    <div class="card">
      <div class="role-bar">
        <button class="role-pill active" id="pill-student" onclick="switchRole('student')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Student
        </button>
        <button class="role-pill" id="pill-admin" onclick="switchRole('admin')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Admin
        </button>
      </div>

      <!-- Student -->
      <div class="form-panel active" id="panel-student">
        <h2 class="card-title">Welcome back</h2>
        <p class="card-sub">Sign in to continue with Campus AI.</p>
        <form class="form" onsubmit="event.preventDefault(); loginStudent();">
          <div class="field">
            <span class="field-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="text" id="s-regno" placeholder="Register number" autocomplete="username" required />
          </div>
          <div class="field">
            <span class="field-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
            <input type="password" id="s-password" placeholder="Password" autocomplete="current-password" required />
          </div>
          <div class="error-msg" id="s-error"></div>
          <button type="submit" class="submit-btn" id="s-btn">
            <div class="spinner"></div><span class="btn-text">Continue</span>
          </button>
        </form>
        <div class="divider"></div>
        <div class="card-footer">Don't have an account? <a href="register.html">Sign up</a></div>
      </div>

      <!-- Admin -->
      <div class="form-panel" id="panel-admin">
        <div class="admin-chip">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Admin access
        </div>
        <h2 class="card-title">Admin sign in</h2>
        <p class="card-sub">Access the Campus AI admin panel.</p>
        <form class="form" onsubmit="event.preventDefault(); loginAdmin();">
          <div class="field">
            <span class="field-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
            <input type="text" id="a-username" placeholder="Username" autocomplete="username" required />
          </div>
          <div class="field">
            <span class="field-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
            <input type="password" id="a-password" placeholder="Password" autocomplete="current-password" required />
          </div>
          <div class="error-msg" id="a-error"></div>
          <button type="submit" class="submit-btn" id="a-btn">
            <div class="spinner"></div><span class="btn-text">Sign in</span>
          </button>
        </form>
        <div class="divider"></div>
        <div class="card-footer">New admin? <a href="admin-register.html">Register with secret key</a></div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://newclg-bot-backend.onrender.com";
    const THEME_KEY = "campus_ai_theme_v5";
    const themeChk = document.getElementById("theme-chk");
    const themeMeta = document.getElementById("theme-color-meta");

    function applyTheme(light) {
      document.documentElement.setAttribute("data-theme", light ? "light" : "dark");
      themeChk.checked = light;
      themeMeta.content = light ? "#ffffff" : "#111111";
      localStorage.setItem(THEME_KEY, light ? "light" : "dark");
    }
    applyTheme(localStorage.getItem(THEME_KEY) === "light");
    themeChk.addEventListener("change", () => applyTheme(themeChk.checked));

    function switchRole(role) {
      const isAdmin = role === "admin";
      document.getElementById("panel-student").classList.toggle("active", !isAdmin);
      document.getElementById("panel-admin").classList.toggle("active", isAdmin);
      document.getElementById("pill-student").classList.toggle("active", !isAdmin);
      document.getElementById("pill-admin").classList.toggle("active", isAdmin);
    }

    function showErr(id, msg) { const e = document.getElementById(id); e.textContent = msg; e.classList.add("visible"); }
    function clearErr(id) { document.getElementById(id).classList.remove("visible"); }

    async function loginStudent() {
      clearErr("s-error");
      const btn = document.getElementById("s-btn");
      btn.disabled = true; btn.classList.add("loading");
      try {
        const res = await fetch(BASE_URL + "/auth/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ register_number: document.getElementById("s-regno").value.trim(), password: document.getElementById("s-password").value }),
        });
        const data = await res.json();
        if (res.ok) { localStorage.setItem("access_token", data.access_token); localStorage.setItem("user_role", "student"); window.location.href = "index.html"; }
        else showErr("s-error", data.error || "Login failed. Please try again.");
      } catch { showErr("s-error", "Network error. Check your connection."); }
      finally { btn.disabled = false; btn.classList.remove("loading"); }
    }

    async function loginAdmin() {
      clearErr("a-error");
      const btn = document.getElementById("a-btn");
      btn.disabled = true; btn.classList.add("loading");
      try {
        const res = await fetch(BASE_URL + "/auth/admin/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: document.getElementById("a-username").value.trim(), password: document.getElementById("a-password").value }),
        });
        const data = await res.json();
        if (res.ok) { localStorage.setItem("access_token", data.access_token); localStorage.setItem("user_role", "admin"); window.location.href = "admin.html"; }
        else showErr("a-error", data.error || "Admin login failed.");
      } catch { showErr("a-error", "Network error. Check your connection."); }
      finally { btn.disabled = false; btn.classList.remove("loading"); }
    }
  </script>
</body>
</html>
