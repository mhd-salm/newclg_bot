<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Campus AI</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
    <div class="header-actions">
    <div class="dd-row">
      <div class="dd-row-left">
        <span>Light mode</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="theme-chk" />
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
      </label>
    </div>
  </div>
  <div class="auth-box">
    <h2>Create Account</h2>

    <input 
      type="text" 
      id="name" 
      placeholder="Full Name" 
      required
    />

    <input 
      type="text" 
      id="register_number" 
      placeholder="Register Number" 
      required
    />

    <input 
      type="text" 
      id="department" 
      placeholder="Department" 
      required
    />

    <input 
      type="number" 
      id="year" 
      placeholder="Year" 
      min="1"
      max="5"
      required
    />

    <input 
      type="password" 
      id="password" 
      placeholder="Password" 
      required
    />

    <button onclick="register()">Register</button>

    <p>
      Already have an account?
      <a href="login.html">Login</a>
    </p>
  </div>
  <script>
  const themeChk = document.getElementById("theme-chk");

  const currentTheme =
    localStorage.getItem("theme") || "dark";

  document.documentElement.setAttribute("data-theme", currentTheme);

  themeChk.checked = currentTheme === "light";

  themeChk.addEventListener("change", () => {
    const newTheme = themeChk.checked ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
  });
</script>
  <script src="auth.js"></script>
</body>
</html>
